help = "Enable stack protectors for some functions vulnerable to stack smashing. Compared to -fstack-protector, this uses a stronger heuristic that includes functions containing arrays of any size (and any type), as well as any calls to alloca or the taking of an address from a local variable"
source_location = "Options.td:3652"

[[options]]
id = 1141
record = "fstack_protector"
enum = "fstack_protector"
kind = "flag"
name = "fstack-protector"
prefixes = ["-"]
spellings = ["-fstack-protector"]
flags = []
visibility = ["DefaultVis"]
num_args = 0
group = "f_Group"
help = "Enable stack protectors for some functions vulnerable to stack smashing. This uses a loose heuristic which considers functions vulnerable if they contain a char (or 8bit integer) array or constant sized calls to alloca , which are of greater size than ssp-buffer-size (default: 8 bytes). All variable sized calls to alloca are considered vulnerable. A function with a stack protector has a guard value added to the stack frame that is checked on function exit. The guard value must be positioned in the stack frame such that a buffer overflow from a vulnerable variable will overwrite the guard value before overwriting the function's return address. The reference stack guard value is stored in a global variable."
source_location = "Options.td:3657"

