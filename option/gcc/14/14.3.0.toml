languages = []
source_location = "gcc/config/rs6000/rs6000.opt:656"
var = "rs6000_density_penalty"
help = "When both heuristics with rs6000-density-pct-threshold and\nrs6000-density-size-threshold are satisfied, we decide to penalize the loop\nbody cost by the value which is specified by this parameter.  The default\nvalue is 10."

[[options]]
