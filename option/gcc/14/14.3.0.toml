[[options]]
id = 3267
name = "-param=rs6000-density-pct-threshold="
spelling = "-param=rs6000-density-pct-threshold="
kind = "joined"
properties = ["Target", "Undocumented", "Joined", "UInteger", "Var(rs6000_density_pct_threshold)", "Init(85)", "IntegerRange(0, 100)", "Param"]
flags = ["Target", "Undocumented", "Joined", "UInteger", "Param"]
languages = []
source_location = "gcc/config/rs6000/rs6000.opt:641"
var = "rs6000_density_pct_threshold"
help = "When costing for loop vectorization, we probably need to penalize the loop body\ncost if the existing cost model may not adequately reflect delays from\nunavailable vector resources.  We collect the cost for vectorized statements\nand non-vectorized statements separately, check the proportion of vec_cost to\ntotal cost of vec_cost and non vec_cost, and penalize only if the proportion\nexceeds the threshold specified by this parameter.  The default value is 85."

[[options]]
id = 3268
name = "-param=rs6000-density-size-threshold="
spelling = "-param=rs6000-density-size-threshold="
kind = "joined"
properties = ["Target", "Undocumented", "Joined", "UInteger", "Var(rs6000_density_size_threshold)", "Init(70)", "IntegerRange(0, 1000)", "Param"]
flags = ["Target", "Undocumented", "Joined", "UInteger", "Param"]
languages = []
source_location = "gcc/config/rs6000/rs6000.opt:650"
var = "rs6000_density_size_threshold"
help = "Like parameter rs6000-density-pct-threshold, we also check the total sum of\nvec_cost and non vec_cost, and penalize only if the sum exceeds the threshold\nspecified by this parameter.  The default value is 70."

[[options]]
id = 3269
name = "-param=rs6000-density-penalty="
spelling = "-param=rs6000-density-penalty="
kind = "joined"
properties = ["Target", "Undocumented", "Joined", "UInteger", "Var(rs6000_density_penalty)", "Init(10)", "IntegerRange(0, 1000)", "Param"]
