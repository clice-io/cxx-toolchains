source_location = "gcc/config/rs6000/rs6000.opt:654"
var = "rs6000_density_size_threshold"
help = "Like parameter rs6000-density-pct-threshold, we also check the total sum of\nvec_cost and non vec_cost, and penalize only if the sum exceeds the threshold\nspecified by this parameter.  The default value is 70."

[[options]]
id = 3385
