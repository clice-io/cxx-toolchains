forms = ["--relocatable-merge-sections"]
argument_kind = "none"
description = "By default, mold doesn't merge input sections by name when merging input object files into a single output object file for -r. For example,.text.foo and.text.bar aren't merged for -r even though they are merged into.text based on the default section merging rules. This option changes the behavior so that mold merges input sections by name by the default section merging rules."
