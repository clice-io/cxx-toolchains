[[options]]
id = 55
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["--allow-shlib-undefined", "--no-allow-shlib-undefined"]
syntax = "--allow-shlib-undefined, --no-allow-shlib-undefined"
forms = ["--allow-shlib-undefined", "--no-allow-shlib-undefined"]
argument_kind = "none"
description = "Even if mold succeeds in linking a main executable without undefined symbol errors, you may still encounter symbol lookup errors at runtime because the dynamic linker cannot find some symbols in shared libraries in any ELF module. This occurs because mold ignores undefined symbols in shared libraries by default. If you pass --no-allow-shlib-undefined, mold verifies that undefined symbols in shared libraries given to the linker can be resolved at link-time. In other words, this converts the runtime error to a link-time error. Note that you need to pass all shared libraries, including indirectly dependent ones, to the linker as arguments for -l. If a shared library depends on a library that's not passed to the linker, the verification will be skipped for that file."
