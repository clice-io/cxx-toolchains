section = "MOLD-SPECIFIC OPTIONS"
spellings = ["--repro"]
syntax = "--repro"
forms = ["--repro"]
argument_kind = "none"
description = "Archive input files, as well as a text file containing command line options, in a tar file so that you can run mold with the exact same inputs again. This is useful for reporting a bug with a reproducer. The output filename is path/to/output.tar, where path/to/output is an output filename specified by -o."
source_location = "docs/mold.md:182"

[[options]]
id = 11
section = "MOLD-SPECIFIC OPTIONS"
spellings = ["--reverse-sections"]
syntax = "--reverse-sections"
forms = ["--reverse-sections"]
argument_kind = "none"
description = "Reverse the order of input sections before assigning them the offsets in the output file. This option is useful for finding bugs that depend on the initialization order of global objects. In C++, constructors of global objects in a single source file are guaranteed to be executed in the source order, but there's no such guarantee across compilation units. Usually, constructors are executed in the order given to the linker, but depending on it is a mistake. By reversing the order of input sections using --reverse-sections, you can easily test that your program works in the reversed initialization order."
source_location = "docs/mold.md:189"

[[options]]
id = 12
section = "MOLD-SPECIFIC OPTIONS"
spellings = ["--run"]
syntax = "--run <command> <arg>..."
forms = ["--run <command> <arg>..."]
argument_kind = "required"
description = "Run command with mold as /usr/bin/ld. Specifically, mold runs a given command with the LD_PRELOAD environment set to intercept exec(3) family functions and replaces argv[0] with itself if it is ld, ld.gold, or ld.lld."
source_location = "docs/mold.md:202"

[[options]]
id = 13
section = "MOLD-SPECIFIC OPTIONS"
spellings = ["--separate-debug-file"]
syntax = "--separate-debug-file, --separate-debug-file=<file>"
forms = ["--separate-debug-file", "--separate-debug-file=<file>"]
argument_kind = "required"
description = "Bundle debug info sections into a separate file instead of embedding them in an output executable or a shared library. mold creates a debug info file in the background by default, so that you can start running your executable as soon as possible. By default, the debug info file is created in the same directory as is the output file, with the.dbg file extension. That filename is embedded into the output file so that gdb can automatically find the debug info file for the output file. For more info about gdb features related to separate debug files, see <https://sourceware.org/gdb/current/onlinedocs/gdb.html/Separate-Debug-Files.html>. mold holds a file lock with flock(2) while creating a debug info file in the background. If you don't want to create a debug info file in the background, pass the --no-detach option."
source_location = "docs/mold.md:208"

[[options]]
id = 14
section = "MOLD-SPECIFIC OPTIONS"
spellings = ["--shuffle-sections"]
syntax = "--shuffle-sections, --shuffle-sections=<number>"
forms = ["--shuffle-sections", "--shuffle-sections=<number>"]
argument_kind = "required"
description = "Randomize the output by shuffling the order of input sections before assigning them the offsets in the output file. If a number is given, it's used as a seed for the random number generator, so that the linker produces the same output for the same seed. If no seed is given, a random number is used as a seed. This option is useful for benchmarking. Modern CPUs are sensitive to a program's memory layout. A seemingly benign change in program layout, such as a small size increase of a function in the middle of a program, can affect the program's performance. Therefore, even if you write new code and get a good benchmark result, it is hard to say whether the new code improves the program's performance; it is possible that the new memory layout happens to perform better. By running a benchmark multiple times with randomized memory layouts using --shuffle-sections, you can isolate your program's real performance number from the randomness caused by memory layout changes."
source_location = "docs/mold.md:227"

[[options]]
id = 15
section = "MOLD-SPECIFIC OPTIONS"
spellings = ["--spare-program-headers"]
syntax = "--spare-program-headers=<number>"
forms = ["--spare-program-headers=<number>"]
argument_kind = "required"
description = "Append the given number of PT_NULL entries to the end of the program header, so that post-link processing tools can easily add new segments by overwriting the null entries. Note that ELF requires all PT_LOAD segments to be sorted by p_vaddr. Therefore, if you add a new LOAD segment, you may need to sort the entire program header."
source_location = "docs/mold.md:246"

