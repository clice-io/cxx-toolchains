[[options]]
id = 20
section = "MOLD-SPECIFIC OPTIONS"
spellings = ["-z rewrite-endbr", "-z norewrite-endbr"]
syntax = "-z rewrite-endbr, -z norewrite-endbr"
forms = ["-z rewrite-endbr", "-z norewrite-endbr"]
argument_kind = "none"
description = "As a security measure, some CPU instruction sets have recently gained a feature to protect control flow integrity by disallowing indirect branches by default. If the feature is enabled, the instruction that is executed immediately after an indirect branch must be an branch target marker instruction, or a CPU-level fault will raise. The marker instruction is also known as \"landing pad\" instruction, to which indirect branches can land. This feature makes ROP attacks harder to conduct. To use the feature, a function whose pointer is taken needs to begin with a landing pad because a function call via a function pointer is compiled to an indirect branch. On the other hand, if a function is called only directly (i.e. referred to only by direct branch instructions), it doesn't have to begin with it. By default, the compiler always emits a landing pad at the beginning of each global function because it doesn't know whether or not the function's pointer is taken in another translation unit. As a result, the resulting binary has more attack surface than necessary. If --rewrite-endbr is given, mold conducts a whole program analysis to identify functions whose addresses are actually taken and rewrites landing pads with no-ops for non-address-taken functions, reducing the attack surface. This feature is currently available only on x86-64."
source_location = "docs/mold.md:270"

