description = "Mark DSO non-deletable at runtime."
source_location = "docs/mold.md:872"

[[options]]
id = 129
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z nodlopen"]
syntax = "-z nodlopen"
forms = ["-z nodlopen"]
argument_kind = "none"
description = "Mark DSO not available to dlopen(3). This option makes it possible for the linker to optimize thread-local variable accesses by rewriting instructions for some targets."
source_location = "docs/mold.md:875"

[[options]]
