section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z ibtplt"]
syntax = "-z ibtplt"
forms = ["-z ibtplt"]
argument_kind = "none"
description = "Generate Intel Branch Tracking (IBT)-enabled PLT which is the default on x86-64. This is the default."
source_location = "docs/mold.md:791"

[[options]]
id = 116
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z execstack", "-z noexecstack"]
syntax = "-z execstack, -z noexecstack"
forms = ["-z execstack", "-z noexecstack"]
argument_kind = "none"
description = "By default, the pages for the stack area (i.e. the pages where local variables reside) are not executable for security reasons. -z execstack makes it executable. -z noexecstack restores the default behavior."
source_location = "docs/mold.md:795"

[[options]]
id = 117
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z keep-text-section-prefix", "-z nokeep-text-section-prefix"]
syntax = "-z keep-text-section-prefix, -z nokeep-text-section-prefix"
forms = ["-z keep-text-section-prefix", "-z nokeep-text-section-prefix"]
argument_kind = "none"
description = "Keep.text.hot,.text.unknown,.text.unlikely,.text.startup, and.text.exit as separate sections in the final binary instead of merging them as.text."
source_location = "docs/mold.md:800"

[[options]]
id = 118
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z rodynamic"]
syntax = "-z rodynamic"
forms = ["-z rodynamic"]
argument_kind = "none"
description = "Make the.dynamic section read-only."
source_location = "docs/mold.md:805"

[[options]]
id = 119
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z relro", "-z norelro"]
syntax = "-z relro, -z norelro"
forms = ["-z relro", "-z norelro"]
argument_kind = "none"
description = "Some sections such as.dynamic have to be writable only during a module is being loaded to memory. Once the dynamic linker finishes its job, such sections won't be mutated by anyone. As a security mitigation, it is preferred to make such segments read-only during program execution. -z relro puts such sections into a special segment called relro. The dynamic linker makes a relro segment read-only after it finishes its job. By default, mold generates a relro segment. -z norelro disables the feature."
source_location = "docs/mold.md:808"

[[options]]
id = 120
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z sectionheader", "-z nosectionheader"]
syntax = "-z sectionheader, -z nosectionheader"
forms = ["-z sectionheader", "-z nosectionheader"]
argument_kind = "none"
description = "-z nosectionheader tell the linker to omit the section header. By default, the linker does not omit the section header."
source_location = "docs/mold.md:820"

[[options]]
id = 121
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z separate-loadable-segments", "-z separate-code", "-z noseparate-code"]
syntax = "-z separate-loadable-segments, -z separate-code, -z noseparate-code"
forms = ["-z separate-loadable-segments", "-z separate-code", "-z noseparate-code"]
argument_kind = "none"
description = "If one memory page contains multiple segments, the page protection bits are set in such a way that the needed attributes (writable or executable) are satisfied for all segments. This usually happens at a boundary of two segments with two different attributes. separate-loadable-segments adds paddings between segments with different attributes so that they do not share the same page. This is the default. separate-code adds paddings only between executable and non-executable segments. noseparate-code does not add any paddings between segments."
source_location = "docs/mold.md:824"

[[options]]
id = 122
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z defs", "-z nodefs"]
syntax = "-z defs, -z nodefs"
forms = ["-z defs", "-z nodefs"]
argument_kind = "none"
description = "Report undefined symbols (even with --shared)."
source_location = "docs/mold.md:838"

[[options]]
id = 123
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z shstk"]
syntax = "-z shstk"
forms = ["-z shstk"]
argument_kind = "none"
description = "Enforce shadow stack by turning GNUPROPERTY_X86_FEATURE_1SHSTK bit in.note.gnu.property output section. Shadow stack is part of Intel Control-flow Enforcement Technology (CET), which is available since Tiger Lake (2020)."
source_location = "docs/mold.md:841"

[[options]]
id = 124
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z start"]
syntax = "-z start<stop>visibility=[ hidden | protected ]"
forms = ["-z start<stop>visibility=[ hidden | protected ]"]
argument_kind = "optional"
description = "If a section name is valid as a C identifier (i.e., it matches /^[_a-zA-Z][_a-zA-Z0-9]*$/), mold creates _startSECNAME and _stopSECNAME symbols to mark the beginning and end of the section, where SECNAME is the section name. You can make these marker symbols visible from other ELF modules by passing -z startstopvisibility=protected. Default is hidden."
source_location = "docs/mold.md:847"

[[options]]
id = 125
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z text", "-z notext", "-z textoff"]
syntax = "-z text, -z notext, -z textoff"
forms = ["-z text", "-z notext", "-z textoff"]
argument_kind = "none"
description = "mold by default reports an error if dynamic relocations are created in read-only sections. If -z notext or -z textoff are given, mold creates such dynamic relocations without reporting an error. -z text restores the default behavior."
source_location = "docs/mold.md:856"

[[options]]
id = 126
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z max-page-size"]
syntax = "-z max-page-size=<number>"
forms = ["-z max-page-size=<number>"]
argument_kind = "required"
description = "Some CPU ISAs support multiple memory page sizes. This option specifies the maximum page size that an output binary can run on. In general, binaries built for a larger page size can run on a system with a smaller page size, but not vice versa. The default value is 4 KiB for i386, x86-64, and RISC-V, and 64 KiB for ARM64."
source_location = "docs/mold.md:862"

[[options]]
id = 127
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z nodefaultlib"]
syntax = "-z nodefaultlib"
forms = ["-z nodefaultlib"]
argument_kind = "none"
description = "Make the dynamic loader ignore default search paths."
source_location = "docs/mold.md:869"

