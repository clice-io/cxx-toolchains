forms = ["--warn-unresolved-symbols", "--error-unresolved-symbols"]
argument_kind = "none"
description = "Normally, the linker reports an error for unresolved symbols. --warn-unresolved-symbols option turns it into a warning. --error-unresolved-symbols option restores the default behavior."
source_location = "docs/mold.1:555"

[[options]]
id = 71
section = "OPTIONS"
spellings = ["--whole-archive", "--no-whole-archive"]
syntax = "--whole-archive, --no-whole-archive"
forms = ["--whole-archive", "--no-whole-archive"]
argument_kind = "none"
description = "When archive files (.a files) are given to a linker, only object files that are needed to resolve undefined symbols are extracted from them and linked to an output file. --whole-archive changes that behavior for subsequent archives so that a linker extracts all object files and link them to an output. For example, if you are creating a shared object file and you want to include all archive members to the output, you should pass --whole-archive. --no-whole-archive restores the default behavior for subsequent archives."
source_location = "docs/mold.1:564"

[[options]]
id = 72
section = "OPTIONS"
spellings = ["--wrap"]
syntax = "--wrap=<symbol>"
forms = ["--wrap=<symbol>"]
argument_kind = "required"
description = "Make <symbol> to be resolved to _wrap<symbol>. The original symbol can be resolved as _real<symbol>. This option is typically used for wrapping an existing function."
source_location = "docs/mold.1:578"

[[options]]
id = 73
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z now, -z lazy"
forms = ["-z now", "-z lazy"]
argument_kind = "required"
description = "By default, functions referring other ELF modules are resolved by the dynamic linker when they are called for the first time. -z now marks an executable or a shared library file so that all dynamic symbols are loaded when a file is loaded to memory. -z lazy restores the default behavior."
source_location = "docs/mold.1:583"

[[options]]
id = 74
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z origin"
forms = ["-z origin"]
argument_kind = "required"
description = "Mark object requiring immediate $ORIGIN processing at runtime."
source_location = "docs/mold.1:593"

[[options]]
id = 75
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z execstack, -z noexecstack"
forms = ["-z execstack", "-z noexecstack"]
argument_kind = "required"
description = "By default, the pages for the stack area (i.e. the pages where local variables reside) are not executable for security reasons. -z execstack makes it executable. -z noexecstack restores the default behavior."
source_location = "docs/mold.1:596"

[[options]]
id = 76
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z keep-text-section-prefix, -z nokeep-text-section-prefix"
forms = ["-z keep-text-section-prefix", "-z nokeep-text-section-prefix"]
argument_kind = "required"
description = "Keep.text.hot,.text.unknown,.text.unlikely,.text.startup and.text.exit as separate sections in the final binary."
source_location = "docs/mold.1:605"

[[options]]
id = 77
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z relro, -z norelro"
forms = ["-z relro", "-z norelro"]
argument_kind = "required"
description = "Some sections such as.dynamic have to be writable only during an executable or a shared library file is being loaded to memory. Once the dynamic linker finishes its job, such sections won't be mutated by anyone. As a security mitigation, it is preferred to make such segments read-only during program execution. -z relro puts such sections into a special section called <relro>. The dynamic linker make a relro segment read-only after it finishes its job. By default, mold generates a relro segment. -z norelro disables the feature."
source_location = "docs/mold.1:612"

