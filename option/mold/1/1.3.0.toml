forms = ["--warn-unresolved-symbols", "--error-unresolved-symbols"]
argument_kind = "none"
description = "Normally, the linker reports an error for unresolved symbols. --warn-unresolved-symbols option turns it into a warning. --error-unresolved-symbols option restores the default behavior."
