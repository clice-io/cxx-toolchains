syntax = "--wrap=<symbol>"
forms = ["--wrap=<symbol>"]
argument_kind = "required"
description = "Make symbol to be resolved to.Sy _wrap Ns Ar symbol. The original symbol can be resolved as.Sy _real Ns Ar symbol. This option is typically used for wrapping an existing function."
source_location = "docs/mold.1:918"

[[options]]
id = 93
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z Cm=[none | warning | error]"
forms = ["-z Cm=[none | warning | error]"]
argument_kind = "optional"
description = "Intel Control-flow Enforcement Technology (CET) is a new x86 feature available since Tiger Lake which is released in 2020. It defines new instructions to harden security to protect programs from control hijacking attacks. You can tell compiler to use the feature by specifying the -fcf-protection flag. -z Cm cet-report flag is used to make sure that all object files were compiled with a correct -fcf-protection flag. If.Sy warning or.Sy error are given, mold prints out a warning or an error message if an object file was not compiled with the compiler flag. mold looks for.Li GNUPROPERTY_X86_FEATURE_1IBT bit and.Li GNUPROPERTY_X86_FEATURE_1SHSTK bit in.Li.note.gnu.property section to determine whether or not an object file was compiled with -fcf-protection."
source_location = "docs/mold.1:927"

[[options]]
id = 94
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z Cm, -z Cm"
forms = ["-z Cm", "-z Cm"]
argument_kind = "required"
description = "By default, functions referring other ELF modules are resolved by the dynamic linker when they are called for the first time. -z Cm now marks an executable or a shared library file so that all dynamic symbols are loaded when a file is loaded to memory. -z Cm lazy restores the default behavior."
source_location = "docs/mold.1:958"

[[options]]
id = 95
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z Cm"
forms = ["-z Cm"]
argument_kind = "required"
description = "Mark object requiring immediate.Dv $ORIGIN processing at runtime."
source_location = "docs/mold.1:968"

[[options]]
id = 96
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z Cm"
forms = ["-z Cm"]
argument_kind = "required"
description = "Turn on.Li GNUPROPERTY_X86_FEATURE_1IBT bit in.Li.note.gnu.property section to indicate that the output uses IBT-enabled PLT. This option implies -z Cm ibtplt."
source_location = "docs/mold.1:973"

[[options]]
id = 97
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z Cm"
forms = ["-z Cm"]
argument_kind = "required"
description = "Generate Intel Branch Tracking (IBT)-enabled PLT. IBT is part of Intel Control-flow Enforcement Technology (CET). IBT is a new x86 feature available since Tiger Lake which is released in 2020. If IBT is enabled, all indirect branch instructions have to branch to a so-called \"landing pad\" instruction. Landing pad itself is a no-op, but it works as a marker that branching to that instruction is expected. If there's no landing pad after branch, the CPU raises an exception. This mechanism makes ROP attacks difficult. Since PLT can be used as an indirect branch target, we need a different instruction sequence for IBT-enabled PLT. If.Sy -z Cm ibtplt is specified, mold generates PLT entries that start with a landing pad. The size of IBT-enabled PLT is 24 bytes as opposed to 16 bytes regular PLT."
source_location = "docs/mold.1:981"

[[options]]
id = 98
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z Cm, -z Cm"
forms = ["-z Cm", "-z Cm"]
argument_kind = "required"
description = "By default, the pages for the stack area (i.e. the pages where local variables reside) are not executable for security reasons. -z Cm execstack makes it executable. -z Cm noexecstack restores the default behavior."
source_location = "docs/mold.1:1000"

[[options]]
id = 99
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z Cm, -z Cm"
forms = ["-z Cm", "-z Cm"]
argument_kind = "required"
description = "Keep.text.hot,.text.unknown,.text.unlikely,.text.startup and.text.exit as separate sections in the final binary."
source_location = "docs/mold.1:1009"

[[options]]
id = 100
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z Cm, -z Cm"
forms = ["-z Cm", "-z Cm"]
argument_kind = "required"
description = "Some sections such as.dynamic have to be writable only during an executable or a shared library file is being loaded to memory. Once the dynamic linker finishes its job, such sections won't be mutated by anyone. As a security mitigation, it is preferred to make such segments read-only during program execution. -z Cm relro puts such sections into a special section called relro. The dynamic linker make a relro segment read-only after it finishes its job. By default, mold generates a.Sy relro segment. -z Cm norelro disables the feature."
source_location = "docs/mold.1:1020"

[[options]]
id = 101
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z Cm, -z Cm, -z Cm"
forms = ["-z Cm", "-z Cm", "-z Cm"]
argument_kind = "required"
description = "If one memory page contains multiple segments, the page protection bits are set in such a way that needed attributes (writable or executable) are satisifed for all segments. This usually happens at a boundary of two segments with two different attributes..Cm separate-loadable-segments adds paddings between segments with different attributes so that they do not share the same page. This is the default..Cm separate-code adds paddings only between executable and non-executable segments..Cm noseparate-code does not add any paddings between segments."
source_location = "docs/mold.1:1044"

[[options]]
id = 102
