spellings = ["-z"]
syntax = "-z Cm, -z Cm"
forms = ["-z Cm", "-z Cm"]
argument_kind = "required"
description = "Report undefined symbols (even with --shared )."
source_location = "docs/mold.1:1064"

[[options]]
id = 103
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z Cm"
forms = ["-z Cm"]
argument_kind = "required"
description = "Enforce shadow stack by turning GNUPROPERTY_X86_FEATURE_1SHSTK bit in.Li.note.gnu.property output section. Shadow stack is part of Intel Control-flow Enforcement Technology (CET), which is available since Tiger Lake (2020)."
source_location = "docs/mold.1:1069"

[[options]]
id = 104
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z Cm, -z Cm, -z Cm"
forms = ["-z Cm", "-z Cm", "-z Cm"]
argument_kind = "required"
description = "mold by default reports an error if dynamic relocations are created in read-only sections. If -z Cm notext or -z Cm textoff are given, mold creates such dynamic relocations without reporting an error. -z Cm text restores the default behavior."
source_location = "docs/mold.1:1075"

[[options]]
id = 105
section = "OPTIONS"
spellings = ["-z"]
syntax = "-z Cm"
forms = ["-z Cm"]
argument_kind = "required"
description = "Some CPU ISAs support multiple different memory page sizes. This option specifies the maximum page size that an output binary can run on. If you specify a large value, the output can run on both large and small page systems, but it wastes a bit of memory at page boundaries on systems with small pages. The default value is 4 KiB for i386, x86-64 and RISC-V, and 64 KiB for ARM64."
source_location = "docs/mold.1:1090"

