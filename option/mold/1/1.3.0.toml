[[options]]
id = 91
section = "OPTIONS"
spellings = ["--whole-archive", "--no-whole-archive"]
syntax = "--whole-archive, --no-whole-archive"
forms = ["--whole-archive", "--no-whole-archive"]
argument_kind = "none"
description = "When archive files.Pf ( Sy.a files) are given to a linker, only object files that are needed to resolve undefined symbols are extracted from them and linked to an output file. --whole-archive changes that behavior for subsequent archives so that a linker extracts all object files and link them to an output. For example, if you are creating a shared object file and you want to include all archive members to the output, you should pass --whole-archive. --no-whole-archive restores the default behavior for subsequent archives."
source_location = "docs/mold.1:902"

[[options]]
