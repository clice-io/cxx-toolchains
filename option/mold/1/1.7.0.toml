spellings = ["-z"]
syntax = "-z Cm, -z Cm"
forms = ["-z Cm", "-z Cm"]
argument_kind = "required"
description = "Report undefined symbols (even with --shared )."
source_location = "docs/mold.1:1107"

[[options]]
id = 107
