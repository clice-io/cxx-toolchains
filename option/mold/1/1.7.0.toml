section = "MOLD-SPECIFIC OPTIONS"
spellings = ["--reverse-sections"]
syntax = "--reverse-sections"
forms = ["--reverse-sections"]
argument_kind = "none"
description = "Reverses the order of input sections before assigning them the offsets in the output file. This option is useful for finding a bug that depends on an initialization order of global objects. In C++, constructors of global objects in a single source file are guaranteed to be executed in the source order, but there's no such guarantee across compilation units. Usually, constructors are executed in the order given to the linker, but depending on it is a mistake. By reversing the order of input sections using --reverse-sections, you can easily test that your program works in the reversed initialization order."
source_location = "docs/mold.1:268"

