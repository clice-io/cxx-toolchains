[[options]]
id = 8
section = "MOLD-SPECIFIC OPTIONS"
spellings = ["--shuffle-sections"]
syntax = "--shuffle-sections, --shuffle-sections=<number>"
forms = ["--shuffle-sections", "--shuffle-sections=<number>"]
argument_kind = "optional"
description = "Randomizes the output by shuffleing the order of input sections before assigning them the offsets in the output file. If number is given, it's used as a seed for the random number generator, so that the linker produces the same output as for the same seed. If no seed is given, a random number is used as a seed. This option is useful for benchmarking. Modern CPUs are sensitive to program's memory layout. A seeming benign change in program layout (such as a small size increase of a function in the middle of a program) can affect program's performance. Therefore, even if you write new code and get a good benchmark result, it is hard to say whether or not the new code improves the programs performance. It is possible that the new memory layout happens to perform better. By running a benchmark multiple time with shuffling memory layout using --shuffle-sections, you can isolate your progrma's real performance number from the randomness caused by memory layout changes."
source_location = "docs/mold.1:290"

