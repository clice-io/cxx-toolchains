spellings = ["-z"]
syntax = "-z Cm"
forms = ["-z Cm"]
argument_kind = "required"
description = "Enforce shadow stack by turning GNUPROPERTY_X86_FEATURE_1SHSTK bit in.Li.note.gnu.property output section. Shadow stack is part of Intel Control-flow Enforcement Technology (CET), which is available since Tiger Lake (2020)."
source_location = "docs/mold.1:1112"

[[options]]
id = 108
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z"]
syntax = "-z Cm, -z Cm, -z Cm"
forms = ["-z Cm", "-z Cm", "-z Cm"]
argument_kind = "required"
description = "mold by default reports an error if dynamic relocations are created in read-only sections. If -z Cm notext or -z Cm textoff are given, mold creates such dynamic relocations without reporting an error. -z Cm text restores the default behavior."
source_location = "docs/mold.1:1118"

[[options]]
