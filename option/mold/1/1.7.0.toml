spellings = ["-z"]
syntax = "-z Cm, -z Cm"
forms = ["-z Cm", "-z Cm"]
argument_kind = "required"
description = "Keep.text.hot,.text.unknown,.text.unlikely,.text.startup and.text.exit as separate sections in the final binary."
source_location = "docs/mold.1:1054"

[[options]]
id = 104
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z"]
syntax = "-z Cm, -z Cm"
forms = ["-z Cm", "-z Cm"]
argument_kind = "required"
description = "Some sections such as.dynamic have to be writable only during an executable or a shared library file is being loaded to memory. Once the dynamic linker finishes its job, such sections won't be mutated by anyone. As a security mitigation, it is preferred to make such segments read-only during program execution. -z Cm relro puts such sections into a special segment called relro. The dynamic linker make a relro segment read-only after it finishes its job. By default, mold generates a relro segment. -z Cm norelro disables the feature."
source_location = "docs/mold.1:1065"

[[options]]
id = 105
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z"]
syntax = "-z Cm, -z Cm, -z Cm"
forms = ["-z Cm", "-z Cm", "-z Cm"]
argument_kind = "required"
description = "If one memory page contains multiple segments, the page protection bits are set in such a way that needed attributes (writable or executable) are satisfied for all segments. This usually happens at a boundary of two segments with two different attributes..Cm separate-loadable-segments adds paddings between segments with different attributes so that they do not share the same page. This is the default..Cm separate-code adds paddings only between executable and non-executable segments..Cm noseparate-code does not add any paddings between segments."
source_location = "docs/mold.1:1087"

[[options]]
id = 106
