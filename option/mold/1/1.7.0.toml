description = "If.Sy relr is specified, all.Li R_*_RELATIVE relocations are put into.Li.relr.dyn section instead of.Li.rel.dyn or.Li.rela.dyn section. Since.Li.relr.dyn section uses a space-efficient encoding scheme, specifying this flag can reduce the size of the output. This is typically most effective for position-independent executable. Note that a runtime loader has to support.Li.relr.dyn to run executables or shared libraries linked with --pack-dyn-relocs=relr, and only ChromeOS, Android and Fuchsia support it as of now in 2022."
