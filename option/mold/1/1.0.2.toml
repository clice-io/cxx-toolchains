[[options]]
id = 75
section = "OPTIONS"
spellings = ["--warn-unresolved-symbols"]
syntax = "--warn-unresolved-symbols"
forms = ["--warn-unresolved-symbols"]
argument_kind = "none"
description = "Normally, the linker reports an error for unresolved symbols. --warn-unresolved-symbols option turns it into a warning. --error-unresolved-symbols option restores the default behavior."
source_location = "docs/mold.1:682"

[[options]]
id = 76
section = "OPTIONS"
spellings = ["--whole-archive"]
syntax = "--whole-archive"
forms = ["--whole-archive"]
argument_kind = "none"
description = "When archive files.Pf ( Sy.a files) are given to a linker, only object files that are needed to resolve undefined symbols are extracted from them and linked to an output file. --whole-archive changes that behavior for subsequent archives so that a linker extracts all object files and link them to an output. For example, if you are creating a shared object file and you want to include all archive members to the output, you should pass --whole-archive. --no-whole-archive restores the default behavior for subsequent archives."
source_location = "docs/mold.1:689"

[[options]]
id = 77
section = "OPTIONS"
spellings = ["--wrap"]
syntax = "--wrap=<symbol>"
forms = ["--wrap=<symbol>"]
argument_kind = "required"
description = "Make symbol to be resolved to.Sy _wrap Ns Ar symbol. The original symbol can be resolved as.Sy _real Ns Ar symbol. This option is typically used for wrapping an existing function."
source_location = "docs/mold.1:704"

[[options]]
id = 78
section = "OPTIONS"
spellings = ["-z Cm"]
syntax = "-z Cm="
forms = ["-z Cm="]
argument_kind = "required"
description = "Intel Control-flow Enforcement Technology (CET) is a new x86 feature available since Tiger Lake which is released in 2020. It defines new instructions to harden security to protect programs from control hijacking attacks. You can tell compiler to use the feature by specifying the -fcf-protection flag. -z Cm cet-report flag is used to make sure that all object files were compiled with a correct -fcf-protection flag. If.Sy warning or.Sy error are given, mold prints out a warning or an error message if an object file was not compiled with the compiler flag. mold looks for.Li GNUPROPERTY_X86_FEATURE_1IBT bit and.Li GNUPROPERTY_X86_FEATURE_1SHSTK bit in.Li.note.gnu.property section to determine whether or not an object file was compiled with -fcf-protection."
source_location = "docs/mold.1:713"

[[options]]
id = 79
section = "OPTIONS"
spellings = ["-z Cm"]
syntax = "-z Cm, -z Cm"
forms = ["-z Cm", "-z Cm"]
argument_kind = "none"
description = "By default, functions referring other ELF modules are resolved by the dynamic linker when they are called for the first time. -z Cm now marks an executable or a shared library file so that all dynamic symbols are loaded when a file is loaded to memory. -z Cm lazy restores the default behavior."
source_location = "docs/mold.1:744"

[[options]]
id = 80
section = "OPTIONS"
spellings = ["-z Cm"]
syntax = "-z Cm"
forms = ["-z Cm"]
argument_kind = "none"
description = "Mark object requiring immediate.Dv $ORIGIN processing at runtime."
source_location = "docs/mold.1:753"

[[options]]
id = 81
section = "OPTIONS"
spellings = ["-z Cm"]
syntax = "-z Cm"
forms = ["-z Cm"]
argument_kind = "none"
description = "Turn on.Li GNUPROPERTY_X86_FEATURE_1IBT bit in.Li.note.gnu.property section to indicate that the output uses IBT-enabled PLT. This option implies -z Cm ibtplt."
source_location = "docs/mold.1:758"

[[options]]
id = 82
section = "OPTIONS"
spellings = ["-z Cm"]
syntax = "-z Cm"
forms = ["-z Cm"]
argument_kind = "none"
description = "Generate Intel Branch Tracking (IBT)-enabled PLT. IBT is part of Intel Control-flow Enforcement Technology (CET). IBT is a new x86 feature available since Tiger Lake which is released in 2020. If IBT is enabled, all indirect branch instructions have to branch to a so-called \"landing pad\" instruction. Landing pad itself is a no-op, but it works as a marker that branching to that instruction is expected. If there's no landing pad after branch, the CPU raises an exception. This mechanism makes ROP attacks difficult. Since PLT can be used as an indirect branch target, we need a different instruction sequence for IBT-enabled PLT. If.Sy -z ibtplt is specified, mold generates PLT entries that start with a landing pad. The size of IBT-enabled PLT is 24 bytes as opposed to 16 bytes regular PLT."
source_location = "docs/mold.1:766"

[[options]]
id = 83
section = "OPTIONS"
spellings = ["-z Cm"]
syntax = "-z Cm, -z Cm"
forms = ["-z Cm", "-z Cm"]
argument_kind = "none"
description = "By default, the pages for the stack area (i.e. the pages where local variables reside) are not executable for security reasons. -z Cm execstack makes it executable. -z Cm noexecstack restores the default behavior."
source_location = "docs/mold.1:785"

[[options]]
id = 84
section = "OPTIONS"
spellings = ["-z Cm"]
syntax = "-z Cm, -z Cm"
forms = ["-z Cm", "-z Cm"]
argument_kind = "none"
description = "Keep.text.hot,.text.unknown,.text.unlikely,.text.startup and.text.exit as separate sections in the final binary."
source_location = "docs/mold.1:793"

[[options]]
id = 85
section = "OPTIONS"
spellings = ["-z Cm"]
syntax = "-z Cm, -z Cm"
forms = ["-z Cm", "-z Cm"]
argument_kind = "none"
description = "Some sections such as.dynamic have to be writable only during an executable or a shared library file is being loaded to memory. Once the dynamic linker finishes its job, such sections won't be mutated by anyone. As a security mitigation, it is preferred to make such segments read-only during program execution. -z Cm relro puts such sections into a special section called relro. The dynamic linker make a relro segment read-only after it finishes its job. By default, mold generates a.Sy relro segment. -z Cm norelro disables the feature."
source_location = "docs/mold.1:803"

[[options]]
id = 86
section = "OPTIONS"
spellings = ["-z Cm"]
syntax = "-z Cm, -z Cm, -z Cm"
forms = ["-z Cm", "-z Cm", "-z Cm"]
argument_kind = "none"
description = "If one memory page contains multiple segments, the page protection bits are set in such a way that needed attributes (writable or executable) are satisifed for all segments. This usually happens at a boundary of two segments with two different attributes..Cm separate-loadable-segments adds paddings between segments with different attributes so that they do not share the same page. This is the default..Cm separate-code adds paddings only between executable and non-executable segments..Cm noseparate-code does not add any paddings between segments."
source_location = "docs/mold.1:826"

[[options]]
id = 87
section = "OPTIONS"
spellings = ["-z Cm"]
syntax = "-z Cm, -z Cm"
forms = ["-z Cm", "-z Cm"]
argument_kind = "none"
description = "Report undefined symbols (even with --shared )."
source_location = "docs/mold.1:844"

[[options]]
id = 88
section = "OPTIONS"
spellings = ["-z Cm"]
syntax = "-z Cm"
forms = ["-z Cm"]
argument_kind = "none"
description = "Enforce shadow stack by turning GNUPROPERTY_X86_FEATURE_1SHSTK bit in.Li.note.gnu.property output section. Shadow stack is part of Intel Control-flow Enforcement Technology (CET), which is available since Tiger Lake (2020)."
source_location = "docs/mold.1:848"

[[options]]
id = 89
section = "OPTIONS"
spellings = ["-z Cm"]
syntax = "-z Cm, -z Cm, -z Cm"
forms = ["-z Cm", "-z Cm", "-z Cm"]
argument_kind = "none"
description = "mold by default reports an error if dynamic relocations are created in read-only sections. If -z Cm notext or -z Cm textoff are given, mold creates such dynamic relocations without reporting an error. -z Cm text restores the default behavior."
source_location = "docs/mold.1:854"

[[options]]
id = 90
section = "OPTIONS"
spellings = ["-z Cm"]
syntax = "-z Cm"
forms = ["-z Cm"]
argument_kind = "none"
description = "Some CPU ISAs support multiple different memory page sizes. This option specifies the maximum page size that an output binary can run on. If you specify a large value, the output can run on both large and small page systems, but it wastes a bit of memory at page boundaries on systems with small pages. The default value is 4 KiB for i386 and x86-64, and 64 KiB for ARM64."
source_location = "docs/mold.1:868"

