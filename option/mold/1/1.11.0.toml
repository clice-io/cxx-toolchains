[[options]]
id = 109
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z relro", "-z norelro"]
syntax = "-z relro, -z norelro"
forms = ["-z relro", "-z norelro"]
argument_kind = "none"
description = "Some sections such as.dynamic have to be writable only during an executable or a shared library file is being loaded to memory. Once the dynamic linker finishes its job, such sections won't be mutated by anyone. As a security mitigation, it is preferred to make such segments read-only during program execution. -z relro puts such sections into a special segment called relro. The dynamic linker make a relro segment read-only after it finishes its job. By default, mold generates a relro segment. -z norelro disables the feature."
source_location = "docs/mold.md:694"

[[options]]
id = 110
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z separate-loadable-segments", "-z separate-code", "-z noseparate-code"]
syntax = "-z separate-loadable-segments, -z separate-code, -z noseparate-code"
forms = ["-z separate-loadable-segments", "-z separate-code", "-z noseparate-code"]
argument_kind = "none"
description = "If one memory page contains multiple segments, the page protection bits are set in such a way that needed attributes (writable or executable) are satisfied for all segments. This usually happens at a boundary of two segments with two different attributes. separate-loadable-segments adds paddings between segments with different attributes so that they do not share the same page. This is the default. separate-code adds paddings only between executable and non-executable segments. noseparate-code does not add any paddings between segments."
