[[options]]
id = 102
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["-z cet-report"]
syntax = "-z cet-report=[ warning | error | none]"
forms = ["-z cet-report=[ warning | error | none]"]
argument_kind = "optional"
description = "Intel Control-flow Enforcement Technology (CET) is a new x86 feature available since Tiger Lake which is released in 2020. It defines new instructions to harden security to protect programs from control hijacking attacks. You can tell compiler to use the feature by specifying the -fcf-protection flag. -z cet-report flag is used to make sure that all object files were compiled with a correct -fcf-protection flag. If warning or error are given, mold prints out a warning or an error message if an object file was not compiled with the compiler flag. mold looks for GNUPROPERTY_X86_FEATURE_1IBT bit and GNUPROPERTY_X86_FEATURE_1SHSTK bit in.note.gnu.property section to determine whether or not an object file was compiled with -fcf-protection."
source_location = "docs/mold.md:649"

