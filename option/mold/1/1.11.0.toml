[[options]]
id = 9
section = "MOLD-SPECIFIC OPTIONS"
spellings = ["--reverse-sections"]
syntax = "--reverse-sections"
forms = ["--reverse-sections"]
argument_kind = "none"
description = "Reverses the order of input sections before assigning them the offsets in the output file. This option is useful for finding bugs that depend on an initialization order of global objects. In C++, constructors of global objects in a single source file are guaranteed to be executed in the source order, but there's no such guarantee across compilation units. Usually, constructors are executed in the order given to the linker, but depending on it is a mistake. By reversing the order of input sections using --reverse-sections, you can easily test that your program works in the reversed initialization order."
source_location = "docs/mold.md:170"

[[options]]
id = 10
section = "MOLD-SPECIFIC OPTIONS"
spellings = ["--run"]
syntax = "--run <command> <arg>..."
forms = ["--run <command> <arg>..."]
argument_kind = "required"
description = "Run command with mold /usr/bin/ld. Specifically, mold runs a given command with the LD_PRELOAD environment set to intercept exec(3) family functions and replaces argv[0] with itself if it is ld, ld.gold or ld.lld."
source_location = "docs/mold.md:185"

[[options]]
id = 11
section = "MOLD-SPECIFIC OPTIONS"
spellings = ["--shuffle-sections"]
syntax = "--shuffle-sections, --shuffle-sections=<number>"
forms = ["--shuffle-sections", "--shuffle-sections=<number>"]
argument_kind = "required"
description = "Randomizes the output by shuffling the order of input sections before assigning them the offsets in the output file. If number is given, it's used as a seed for the random number generator, so that the linker produces the same output for the same seed. If no seed is given, a random number is used as a seed. This option is useful for benchmarking. Modern CPUs are sensitive to program's memory layout. A seeming benign change in program layout such as a small size increase of a function in the middle of a program can affect program's performance. Therefore, even if you write new code and get a good benchmark result, it is hard to say whether or not the new code improves the programs performance; it is possible that the new memory layout happens to perform better. By running a benchmark multiple time with randomized memory layouts using --shuffle-sections, you can isolate your program's real performance number from the randomness caused by memory layout changes."
source_location = "docs/mold.md:191"

