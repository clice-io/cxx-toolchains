[[options]]
id = 70
section = "GNU-COMPATIBLE OPTIONS"
spellings = ["--icf", "--no-icf"]
syntax = "--icf=[ safe | all | none ], --no-icf"
forms = ["--icf=[ safe | all | none ]", "--no-icf"]
argument_kind = "optional"
description = "It is not uncommon for a program to contain many identical functions that differ only in name. For example, a C++ template std::vector is very likely to be instantiated to the identical code for std::vector<int> and std::vector<unsigned> because the container cares only about the size of the parameter type. Identical Code Folding (ICF) is a size optimization to identify and merge such identical functions. If --icf=all is given, mold tries to merge all identical functions. This reduces the size of the output most, but it is not a \"safe\" optimization. It is guaranteed in C and C++ that two pointers pointing two different functions will never be equal, but --icf=all breaks that assumption as two identical functions have the same address after merging. So a care must be taken when you use thsi flag that your program does not depend on the function pointer uniqueness. --icf=safe is a flag to merge functions only when it is safe to do so. That is, if a program does not take an address of a function, it is safe to merge that function with other function, as you cannot compare a function pointer with something else without taking an address of a function. --icf=safe needs to be used with a compiler that supports.llvm_addrsig section which contains the information as to what symbols are address-taken. LLVM/Clang supports that section by default. Since GCC does not support it yet, you cannot use --icf=safe with GCC (it doesn't do any harm but can't optimize at all.) --icf=none and --no-icf disables ICF."
source_location = "docs/mold.md:478"

