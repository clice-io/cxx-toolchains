help = "Specify the stream that CUDA commands from the compiled program will be sent to by default. Allowed values for this option: legacy The CUDA legacy stream (per context, implicitly synchronizes with other streams) per-thread A normal CUDA stream (per thread, does not implicitly synchronize with other streams) null is a deprecated alias for legacy . Default value: legacy"

[[options]]
id = 62
spellings = ["--gpu-architecture", "-arch"]
long = "--gpu-architecture"
aliases = ["-arch"]
argument_kind = "required"
synopsis = "--gpu-architecture arch (-arch)"
argument_text = "arch"
help = "Specify the name of the class of NVIDIA virtual GPU architecture for which the CUDA input files must be compiled. With the exception as described for the shorthand below, the architecture specified with this option must be a virtual architecture (such as compute_50). Normally, this option alone does not trigger assembly of the generated PTX for a real architecture (that is the role of nvcc option --gpu-code , see below); rather, its purpose is to control preprocessing and compilation of the input to PTX. For convenience, in case of simple nvcc compilations, the following shorthand is supported. If no value for option --gpu-code is specified, then the value of this option defaults to the value of --gpu-architecture . In this situation, as only exception to the description above, the value specified for --gpu-architecture may be a real architecture (such as a sm_50), in which case nvcc uses the specified real architecture and its closest virtual architecture as effective architecture values. For example, nvcc --gpu-architecture=sm_50 is equivalent to nvcc --gpu-architecture=compute_50 --gpu-code =sm_50,compute_50 . See Virtual Architecture Feature List for the list of supported virtual architectures and GPU Feature List for the list of supported real architectures."

[[options]]
id = 63
spellings = ["--gpu-code", "-code"]
long = "--gpu-code"
aliases = ["-code"]
argument_kind = "required"
synopsis = "--gpu-code code,... (-code)"
argument_text = "code,..."
help = "Specify the name of the NVIDIA GPU to assemble and optimize PTX for. nvcc embeds a compiled code image in the resulting executable for each specified code architecture, which is a true binary load image for each real architecture (such as sm_50), and PTX code for the virtual architecture (such as compute_50). During runtime, such embedded PTX code is dynamically compiled by the CUDA runtime system if no binary load image is found for the current GPU. Architectures specified for options --gpu-architecture and --gpu-code may be virtual as well as real , but the code architectures must be compatible with the arch architecture. When the --gpu-code option is used, the value for the --gpu-architecture option must be a virtual PTX architecture. For instance, --gpu-architecture =compute_35 is not compatible with --gpu-code=sm_30 , because the earlier compilation stages will assume the availability of compute_35 features that are not present on sm_30 . See Virtual Architecture Feature List for the list of supported virtual architectures and GPU Feature List for the list of supported real architectures."

[[options]]
id = 64
spellings = ["--generate-code", "-gencode"]
long = "--generate-code"
aliases = ["-gencode"]
argument_kind = "required"
synopsis = "--generate-code specification (-gencode)"
argument_text = "specification"
help = "This option provides a generalization of the --gpu-architecture = arch --gpu-code = code,... option combination for specifying nvcc behavior with respect to code generation. Where use of the previous options generates code for different real architectures with the PTX for the same virtual architecture, option --generate-code allows multiple PTX generations for different virtual architectures. In fact, --gpu-architecture = arch --gpu-code = code,... is equivalent to --generate-code arch= arch ,code= code,... . --generate-code options may be repeated for different virtual architectures. See Virtual Architecture Feature List for the list of supported virtual architectures and GPU Feature List for the list of supported real architectures."

[[options]]
id = 65
spellings = ["--relocatable-device-code", "-rdc"]
long = "--relocatable-device-code"
aliases = ["-rdc"]
argument_kind = "required"
synopsis = "--relocatable-device-code { true | false } (-rdc)"
argument_text = "{ true | false }"
help = "Enable (disable) the generation of relocatable device code. If disabled, executable device code is generated. Relocatable device code must be linked before it can be executed. Allowed values for this option: true , false . Default value: false"

[[options]]
id = 66
spellings = ["--entries", "-e"]
long = "--entries"
aliases = ["-e"]
argument_kind = "required"
synopsis = "--entries entry,... (-e)"
argument_text = "entry,..."
help = "Specify the global entry functions for which code must be generated. By default, code will be generated for all entries."

[[options]]
id = 67
spellings = ["--maxrregcount", "-maxrregcount"]
long = "--maxrregcount"
aliases = ["-maxrregcount"]
argument_kind = "required"
synopsis = "--maxrregcount amount (-maxrregcount)"
argument_text = "amount"
help = "Specify the maximum amount of registers that GPU functions can use. Until a function-specific limit, a higher value will generally increase the performance of individual GPU threads that execute this function. However, because thread registers are allocated from a global register pool on each GPU, a higher value of this option will also reduce the maximum thread block size, thereby reducing the amount of thread parallelism. Hence, a good maxrregcount value is the result of a trade-off. If this option is not specified, then no maximum is assumed. Value less than the minimum registers required by ABI will be bumped up by the compiler to ABI minimum limit."

[[options]]
id = 68
spellings = ["--use_fast_math", "-use_fast_math"]
long = "--use_fast_math"
aliases = ["-use_fast_math"]
argument_kind = "none"
synopsis = "--use_fast_math (-use_fast_math)"
help = "Make use of fast math library. --use_fast_math implies --ftz =true --prec-div =false --prec-sqrt =false --fmad =true ."

[[options]]
id = 69
spellings = ["--ftz", "-ftz"]
long = "--ftz"
